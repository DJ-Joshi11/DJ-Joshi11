<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Devansh Joshi — Full-Stack Engineer, Founder, Builder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1f"/>
      <stop offset="0.5" stop-color="#0f1733"/>
      <stop offset="1" stop-color="#0a1126"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.55" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="round"><rect x="0" y="0" width="1200" height="300" rx="18"/></clipPath>
    <style>
      .name  { font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif; font-weight:700; fill:#f8fafc; letter-spacing:2px; }
      .tag   { font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif; font-weight:500; fill:#cbd5e1; letter-spacing:1px; }
      .mono  { font-family:'SF Mono','Consolas','Courier New',monospace; fill:#7dd3fc; }
      .meta  { font-family:'Segoe UI',Arial,sans-serif; fill:#64748b; letter-spacing:1px; }
      .fade  { animation: fadeUp .9s ease-out both; }
      .fade2 { animation: fadeUp .9s ease-out .25s both; }
      .fade3 { animation: fadeUp .9s ease-out .9s both; }
      .line  { animation: grow .8s ease-out .45s both; transform-box:fill-box; transform-origin:left center; }
      .type  { animation: type 1.7s steps(46) .8s both; }
      .sheenfx { animation: slide 7s ease-in-out infinite; }
      .pulse { animation: pulse 3.2s ease-in-out infinite; }
      @keyframes fadeUp { from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);} }
      @keyframes grow   { from{transform:scaleX(0);} to{transform:scaleX(1);} }
      @keyframes type   { from{clip-path:inset(0 100% 0 0);} to{clip-path:inset(0 0 0 0);} }
      @keyframes slide  { 0%{transform:translateX(-400px);} 60%,100%{transform:translateX(1500px);} }
      @keyframes pulse  { 0%,100%{opacity:.25;} 50%{opacity:.9;} }
    </style>
  </defs>

  <g clip-path="url(#round)">
    <rect x="0" y="0" width="1200" height="300" fill="url(#bg)"/>

    <!-- network-node motif (systems thinking) -->
    <g stroke="#38bdf8" stroke-width="1" stroke-opacity="0.25" fill="none">
      <line x1="980" y1="70" x2="1080" y2="120"/>
      <line x1="1080" y1="120" x2="1010" y2="210"/>
      <line x1="1010" y1="210" x2="920" y2="160"/>
      <line x1="920" y1="160" x2="980" y2="70"/>
      <line x1="1080" y1="120" x2="1150" y2="200"/>
      <line x1="920" y1="160" x2="1010" y2="210"/>
    </g>
    <g fill="#38bdf8">
      <circle class="pulse" cx="980"  cy="70"  r="4" style="animation-delay:0s"/>
      <circle class="pulse" cx="1080" cy="120" r="5" style="animation-delay:.6s"/>
      <circle class="pulse" cx="1010" cy="210" r="4" style="animation-delay:1.2s"/>
      <circle class="pulse" cx="920"  cy="160" r="3.5" style="animation-delay:1.8s"/>
      <circle class="pulse" cx="1150" cy="200" r="4" style="animation-delay:2.4s"/>
    </g>

    <!-- text -->
    <text class="name fade" x="72" y="138" font-size="66">Devansh Joshi</text>
    <rect class="line" x="74" y="160" width="430" height="5" rx="2.5" fill="url(#accent)"/>
    <text class="tag fade2" x="76" y="208" font-size="27">Full-Stack Engineer &#183; Founder &#183; Builder</text>
    <text class="mono type" x="76" y="248" font-size="18">&gt; engineering products from the customer backward</text>
    <text class="meta fade3" x="76" y="280" font-size="15">Computer Science &#183; Class of 2028 &#183; Bengaluru, India</text>

    <!-- moving sheen -->
    <rect class="sheenfx" x="0" y="0" width="240" height="300" fill="url(#sheen)" transform="skewX(-18)"/>
  </g>
</svg>
